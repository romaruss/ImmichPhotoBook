services:
  photobook:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: photobook-studio-test
    restart: unless-stopped
    ports:
      - "7180:8000"       
    volumes:
      - photobook_data_test:/data
    environment:
      - TZ=Europe/Rome
      - STADIA_MAPS_API_KEY=${STADIA_MAPS_API_KEY}
      # Protezione accesso: imposta una password sicura per abilitare l'autenticazione.
      # Lascia vuoto o rimuovi la riga per disabilitare (accesso libero in LAN).
      # Genera un token: python3 -c "import secrets; print(secrets.token_hex(32))"
      - PHOTOBOOK_TOKEN=${PHOTOBOOK_TOKEN:-}
      # Strumenti sviluppo: abilita Advanced Config e Layout Log nell'UI.
      # Imposta a "true" per abilitare, lascia vuoto o rimuovi per disabilitare.
      - PHOTOBOOK_DEV=${PHOTOBOOK_DEV:-}
    # ── Connessione alla rete di Immich ──────────────────────────────────────
    # Decommenta la riga qui sotto se Immich gira con docker-compose
    # e sostituisci "immich_default" con il nome della tua rete Immich.
    # Per trovarlo: docker network ls | grep immich
    # networks:
    #   - immich_net
    #
    # Se invece Immich è sull'host o su un altro server, puoi usare
    # http://host.docker.internal:2283 come URL nei settings.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/config"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  photobook_data_test:
    name: photobook_data_test

# ── RETE IMMICH (decommenta se necessario) ────────────────────────────────────
networks:
  immich_net:
    name: immich_default    # ← sostituisci con il nome reale
    external: true
